# ============================================================
# GET Framework Configuration
# ============================================================
# This file controls all parameters of the pipeline.
# Change values here to switch tasks, models, or metrics
# without touching any code.

# ── Dataset ─────────────────────────────────────────────────
dataset:
  name: "agentlans/grammar-correction"   # HuggingFace dataset
  split: "train"
  sample_size: 50                         # how many real sentences to load

# ── Generation (LLM that creates synthetic data) ────────────
generation:
  provider: "groq"                        # groq | openai
  model: "llama-3.1-8b-instant"          # default model (user can change)
  api_key: "YOUR_API_KEY_HERE"           # paste your key here
  temperature: 0.5                        # above 0 = variance across runs
  num_runs: 3                             # repeat N times → mean ± std
  sample_size: 20                         # synthetic sentences per run

# ── Task ────────────────────────────────────────────────────
task:
  name: "gec"                             # gec | hate_speech | spam (future)

# ── Task Models (models being evaluated) ────────────────────
task_models:
  - name: "vennify/t5-base-grammar-correction"
    type: "t5"
  - name: "prithivida/grammar_error_correcter_v1"
    type: "gec_v1"

# ── Metrics ─────────────────────────────────────────────────
metrics:
  - gleu
  - errant

# ── Output ──────────────────────────────────────────────────
output:
  results_path: "results.json"