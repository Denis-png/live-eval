# ── API keys ────────────────────────────────────────────────
# Values use ${ENV_VAR} substitution. Copy example.env → .env
# in the repo root and fill in your keys (or export them in your shell).
# Generators auto-resolve api_keys[provider]; the claude evaluator picks
# api_keys.anthropic. Leave entries you don't use blank.
api_keys:
  groq: "${GROQ_API_KEY}"
  openai: "${OPENAI_API_KEY}"
  openrouter: "${OPENROUTER_API_KEY}"
  mistral: "${MISTRAL_API_KEY}"
  minimax: "${MINIMAX_API_KEY}"
  anthropic: "${ANTHROPIC_API_KEY}"
  google: "${GOOGLE_API_KEY}"
  huggingface: "${HF_TOKEN}"

# ── Dataset ─────────────────────────────────────────────────
dataset:
  source: huggingface # huggingface | local
  name: "deysi/spam-detection-dataset"
  split: "train"
  sample_size: 50
  streaming: false # set true for large HuggingFace datasets
  # For local datasets (source: local):
  # local_path: data/gec/fce.m2
  # format: m2                 # m2 | csv | tsv

# ── Generation (LLM that creates synthetic corrupted sentences) ──
generation:
  mode: "forward"                  # forward | inverse  (forward = existing behaviour)
  provider: "openrouter"           # groq | openai | openrouter | mistral | minimax | anthropic | google
  model: "minimax-m3"
  temperature: 1.0             # CoT 3-step prompt benefits from higher T
  max_tokens: 1024             # required by Anthropic; ignored by OpenAI-compatible providers
  num_runs: 3                  # repeat N times → outputs mean ± std
  sample_size: 20              # synthetic sentences per run
  timeout: 300                 # per-request HTTP timeout in seconds (SDK default: 600)
  max_retries: 1               # SDK retries on 5xx/429 (SDK default: 2)
  request_delay: 10            # seconds to sleep between requests to respect provider TPM limits
  # api_key is auto-resolved from api_keys[provider]; uncomment to override:
  # api_key: "..."
  # ── Inverse mode (only read when mode == inverse) ──
  # Corrupt a known-clean sentence according to an error distribution.
  inverse:
    source_field: "correct"        # dataset field holding the clean source text
                                   #   gec: "correct" | spam: "incorrect" (the HAM message)
    profile_size: 200              # raw rows scanned to profile the empirical error
                                   #   distribution (spam: SPAM signal rates)
    placeholder_distribution:      # fallback when no empirical profile is available
      count_mean: 1.5
      count_max: 5

# ── Judge (optional LLM-as-judge that filters bad generations) ──
# If omitted or enabled=false → judging is skipped.
# Same shape as `generation`. api_key auto-resolved from api_keys[provider].
judge:
  enabled: false
  provider: "groq"
  model: "llama-3.1-8b-instant"
  temperature: 0
  max_tokens: 1024
  timeout: 300
  max_retries: 1

# ── Task ────────────────────────────────────────────────────
task:
  name: "spam" # gec | spam | hate_speech (future)

# ── Task Models (models under evaluation) ───────────────────
task_models:
  - name: "mshenoda/roberta-spam"
    type: "roberta"
  - name: "mariagrandury/roberta-base-finetuned-sms-spam-detection"
    type: "roberta"

# ── Compute ─────────────────────────────────────────────────
# Device for HuggingFace/torch models (CoLA scorer + the seq2seq GEC
# models under evaluation: t5, gec_v1, coedit).
# auto = use GPU only if available AND its compute capability is supported
#        by the installed PyTorch build (otherwise CPU).
# cpu  = force CPU.
# cuda = force GPU (will crash if not supported).
compute:
  device: cpu

# ── Output ──────────────────────────────────────────────────
# Synthetic data from each run is archived (never reused) under
# generated_data_dir/<task>/ as <session>_run<N>.json.
# The results file is {"meta": <provenance>, "results": <scores>} and is
# rewritten after every run, so an interrupted session keeps completed runs
# (meta.partial is true until the last run finishes).
output:
  results_path: "results.json"
  generated_data_dir: "framework/data/generated"

# ── Multi-model comparison (read only by scripts/compare_models.py) ──
# Runs each entry over the SAME sample; writes results/<task>_<mode>_<provider>_<model>.json.
# generation_models:
#   - provider: anthropic
#     model: claude-haiku-4-5
#   - provider: openrouter
#     model: minimax-m2.7
#     temperature: 1.0
# output.results_dir controls where per-model + comparison files land (default: results/).
